name: Collect Alpha Report

on:
  workflow_run:
    workflows: ["Collect FinMind"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  collect-alpha:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run Alpha Report
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          FINMIND_TOKEN:        ${{ secrets.FINMIND_TOKEN }}
          COLLECT_MODE:         alpha
        run: node .github/scripts/collect_market_data.js
