name: Daily Market Data Collector

on:
  schedule:
    # 台灣時間 06:00 = UTC 前一天 22:00（TWSE）
    - cron: '0 22 * * 0-4'
    # 台灣時間 06:30 = UTC 前一天 22:30（FinMind）
    - cron: '30 22 * * 0-4'
    # 新聞每 2 小時更新一次（全天候）
    - cron: '0 */2 * * *'
    # 每週備份：週日 UTC 01:00（台灣時間週日 09:00）
    - cron: '0 1 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '收集模式'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - twse
          - finmind
          - alpha
          - news
          - backup

jobs:
  # ── TWSE job ──
  collect-twse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'twse' || github.event.inputs.mode == 'all')) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 22 * * 0-4')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run TWSE collect
        env:
          FINMIND_TOKEN:        ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MODE:         twse
        run: node .github/scripts/collect_market_data.js

  # ── Alpha job：TWSE 跑完後自動接著跑（台灣時間約 08:10）──
  # 同時支援手動觸發
  collect-alpha:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [collect-twse]
    if: |
      always() &&
      (
        (github.event_name == 'schedule' && github.event.schedule == '0 22 * * 0-4') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'alpha' || github.event.inputs.mode == 'all'))
      )
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run Alpha Report
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          COLLECT_MODE:         alpha
        run: node .github/scripts/collect_market_data.js

  # ── News job ──
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'all' || github.event.inputs.mode == 'news')) ||
      (github.event_name == 'schedule' && contains(github.event.schedule, '*/2'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run News collect
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MODE:         news
        run: node .github/scripts/collect_market_data.js

  # ── FinMind job ──
  collect-finmind:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'finmind' || github.event.inputs.mode == 'all')) ||
      (github.event_name == 'schedule' && github.event.schedule == '30 22 * * 0-4')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run FinMind collect
        env:
          FINMIND_TOKEN:        ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MODE:         finmind
        run: node .github/scripts/collect_market_data.js

  # ── Weekly Backup job ──
  backup-to-pcloud:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 1 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'backup')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 安裝 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      # 從 Secret 還原 rclone pcloud 設定
      - name: Configure rclone pCloud
        env:
          RCLONE_PCLOUD_TOKEN:    ${{ secrets.RCLONE_PCLOUD_TOKEN }}
          RCLONE_PCLOUD_HOSTNAME: ${{ secrets.RCLONE_PCLOUD_HOSTNAME }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [pcloud]
          type = pcloud
          hostname = ${RCLONE_PCLOUD_HOSTNAME}
          token = ${RCLONE_PCLOUD_TOKEN}
          EOF
          echo "✅ rclone 設定完成"

      # 測試 pCloud 連線
      - name: Test pCloud connection
        run: |
          rclone lsd pcloud: || echo "⚠️ pCloud 根目錄列出失敗，繼續執行"
          rclone mkdir pcloud:AlphaScope-Backups || true

      # 執行備份腳本
      - name: Run backup
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node .github/scripts/backup.js
