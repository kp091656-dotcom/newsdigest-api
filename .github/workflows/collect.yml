name: Daily Market Data Collector

on:
  schedule:
    # 台灣時間 06:00 = UTC 前一天 22:00（TWSE）
    - cron: '0 22 * * 0-4'
    # 台灣時間 06:30 = UTC 前一天 22:30（FinMind）
    - cron: '30 22 * * 0-4'
    # 新聞每 2 小時更新一次（全天候）
    - cron: '0 */2 * * *'
    # Alpha 每日報告（台灣時間 08:05 = UTC 00:05）
    # 週一~週五 UTC = 週一~週五台灣時間 08:05（正確）
    - cron: '5 0 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '收集模式'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - twse
          - finmind
          - alpha
          - news

jobs:
  # ── TWSE job ──
  collect-twse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'twse' || github.event.inputs.mode == 'all')) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 22 * * 0-4')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run TWSE collect
        env:
          FINMIND_TOKEN:        ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MODE:         twse
        run: node .github/scripts/collect_market_data.js

  # ── News job ──
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 */2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'all' || github.event.inputs.mode == 'news'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run News collect
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MODE:         news
        run: node .github/scripts/collect_market_data.js

  # ── Alpha job ──
  collect-alpha:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '5 0 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'alpha' || github.event.inputs.mode == 'all'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run Alpha Report
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          COLLECT_MODE:         alpha
        run: node .github/scripts/collect_market_data.js

  # ── FinMind job ──
  collect-finmind:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'finmind' || github.event.inputs.mode == 'all')) ||
      (github.event_name == 'schedule' && github.event.schedule == '30 22 * * 0-4')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run FinMind collect
        env:
          FINMIND_TOKEN:        ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MODE:         finmind
        run: node .github/scripts/collect_market_data.js
