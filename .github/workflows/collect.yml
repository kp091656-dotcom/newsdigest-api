name: Daily Market Data Collector

on:
  schedule:
    # 台灣時間 06:00 = UTC 前一天 22:00
    # TWSE OpenAPI 於 05:30 更新，06:00 執行確保資料已就緒
    - cron: '0 22 * * 0-4'   # UTC 週日~週四 22:00 = 台灣週一~週五 06:00（TWSE）
    # 台灣時間 06:30 = UTC 前一天 22:30（FinMind 稍晚）
    - cron: '30 22 * * 0-4'  # UTC 週日~週四 22:30 = 台灣週一~週五 06:30（FinMind）
  workflow_dispatch:
    inputs:
      mode:
        description: '收集模式（twse / finmind / all）'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - twse
          - finmind

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 決定 COLLECT_MODE：
      # - 手動觸發 → 用 inputs.mode
      # - cron :00 → twse
      # - cron :30 → finmind
      - name: Set COLLECT_MODE
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%M)" = "00" ]; then
            echo "mode=twse" >> $GITHUB_OUTPUT
          else
            echo "mode=finmind" >> $GITHUB_OUTPUT
          fi

      - name: Run collect_market_data.js
        env:
          FINMIND_TOKEN:        ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MODE:         ${{ steps.mode.outputs.mode }}
        run: node .github/scripts/collect_market_data.js
