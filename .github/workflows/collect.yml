name: Daily Market Data Collector

on:
  schedule:
    # 每天台灣時間 20:30（UTC 12:30），所有盤後資料都已更新
    - cron: '30 12 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install @supabase/supabase-js node-fetch

      - name: Collect and store market data
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VERCEL_API_BASE:   ${{ secrets.VERCEL_API_BASE }}
        run: node .github/scripts/collect_market_data.js
