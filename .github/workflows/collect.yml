name: Daily Market Data Collector

on:
  schedule:
    # 台灣時間 06:00 = UTC 前一天 22:00（TWSE）
    - cron: '0 22 * * 0-4'
    # 台灣時間 06:30 = UTC 前一天 22:30（FinMind）
    - cron: '30 22 * * 0-4'
    # 新聞每 2 小時更新一次（全天候）
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '收集模式（twse / finmind / all）'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - twse
          - finmind

jobs:
  # ── TWSE job：只在 :00 cron 或手動 twse/all 時執行 ──
  collect-twse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'twse' || github.event.inputs.mode == 'all') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 22')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run TWSE collect
        env:
          FINMIND_TOKEN:        ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MODE:         twse
        run: node .github/scripts/collect_market_data.js

  # ── News job：每 2 小時更新一次，或手動 all 時執行 ──
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 */2') ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'all' || github.event.inputs.mode == 'twse')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run News collect
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MODE:         news
        run: node .github/scripts/collect_market_data.js

  # ── FinMind job：只在 :30 cron 或手動 finmind/all 時執行 ──
  collect-finmind:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'finmind' || github.event.inputs.mode == 'all') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '30 22')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run FinMind collect
        env:
          FINMIND_TOKEN:        ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COLLECT_MODE:         finmind
        run: node .github/scripts/collect_market_data.js
