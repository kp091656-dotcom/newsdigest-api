name: eGift 名單同步

on:
  schedule:
    # 每週一、三、五 09:30 台灣時間（UTC 01:30）同步集保最新名單
    - cron: '30 1 * * 1,3,5'
  workflow_dispatch:

jobs:
  sync-egift:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pdf-parse
        run: npm install pdf-parse@1.1.1

      - name: Run eGift scraper
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node .github/scripts/scrape_egift.js
