name: Test TWSE API Access

on:
  workflow_dispatch:  # 只手動觸發，測試用

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test TWSE OpenAPI accessibility
        run: node .github/scripts/test_twse_api.js

      - name: Show runner IP (for debugging)
        run: curl -s https://api.ipify.org && echo
