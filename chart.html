<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlphaScope — K 線圖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f0f5;
    --surface: #ffffff;
    --border: #e2e2ec;
    --border-dark: #c4c4d4;
    --accent: #6366f1;
    --accent2: #0ea5e9;
    --text: #16161a;
    --muted: #6e6e7e;
    --header-bg: #0c0c18;
    --up: #dc2626;
    --down: #16a34a;
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,0.05) 1px, transparent 0);
    background-size: 28px 28px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--header-bg);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06), 0 4px 24px rgba(0,0,0,0.35);
    border-bottom: 1px solid rgba(99,102,241,0.3);
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 1rem;
    color: #fff;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    letter-spacing: 0.03em;
  }
  .logo span { color: #818cf8; }
  .logo-badge {
    background: rgba(99,102,241,0.25);
    border: 1px solid rgba(99,102,241,0.45);
    color: #a5b4fc;
    font-size: 0.48rem;
    padding: 0.12rem 0.36rem;
    border-radius: 3px;
    letter-spacing: 0.12em;
    font-weight: 500;
  }
  .back-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.55);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 0.28rem 0.75rem;
    border-radius: var(--r-sm);
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }

  .search-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    box-shadow: var(--shadow-sm);
  }
  .search-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
  }
  .search-input {
    border: 1px solid var(--border-dark);
    border-radius: var(--r-sm);
    padding: 0.38rem 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    background: #fff;
    color: var(--text);
    outline: none;
    width: 140px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
  .search-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--r-sm);
    padding: 0.38rem 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    font-weight: 500;
    box-shadow: 0 1px 3px rgba(99,102,241,0.3);
    transition: background 0.15s, transform 0.1s;
  }
  .search-btn:hover { background: #4f46e5; transform: translateY(-1px); }
  .search-btn:active { transform: translateY(0); }

  /* 快速代碼按鈕 */
  .quick-chips {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    flex-wrap: wrap;
  }
  .chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    padding: 0.22rem 0.55rem;
    border-radius: 999px;
    border: 1px solid var(--border-dark);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* 主內容 */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 1.2rem;
    padding: 1.2rem 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .chart-panel {
    background: var(--surface);
    border-radius: var(--r-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    overflow: hidden;
  }
  .chart-header {
    padding: 0.85rem 1.1rem 0.7rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chart-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .stock-badge {
    background: rgba(99,102,241,0.1);
    color: var(--accent);
    font-size: 0.6rem;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    border: 1px solid rgba(99,102,241,0.2);
  }
  .interval-btns { display: flex; gap: 0.25rem; }
  .interval-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    padding: 0.22rem 0.55rem;
    border-radius: var(--r-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .interval-btn:hover { border-color: var(--accent); color: var(--accent); }
  .interval-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  #tvContainer {
    height: 520px;
    width: 100%;
  }
  #tvContainer iframe { width: 100%; height: 100%; border: none; }

  /* 右側面板 */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .info-card {
    background: var(--surface);
    border-radius: var(--r-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .info-card-header {
    padding: 0.65rem 0.9rem;
    border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    background: var(--bg);
  }
  .info-card-body { padding: 0.75rem 0.9rem; }

  /* 股價資訊 */
  .price-big {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .price-chg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    margin-bottom: 0.6rem;
  }
  .price-chg.up { color: var(--up); }
  .price-chg.down { color: var(--down); }
  .price-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
  }
  .meta-item {
    background: var(--bg);
    border-radius: var(--r-sm);
    padding: 0.4rem 0.5rem;
  }
  .meta-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.5rem; color: var(--muted); margin-bottom: 2px; }
  .meta-val   { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; font-weight: 600; color: var(--text); }

  /* 歷史走勢（Supabase bar） */
  #histBars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 60px;
    padding: 0.5rem 0.9rem 0;
  }
  #histDates {
    display: flex;
    gap: 2px;
    padding: 2px 0.9rem 0.5rem;
  }

  /* 估值資訊 */
  .val-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.4rem;
  }
  .val-item {
    text-align: center;
    background: var(--bg);
    border-radius: var(--r-sm);
    padding: 0.45rem 0.3rem;
  }
  .val-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.48rem; color: var(--muted); }
  .val-num   { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; font-weight: 700; color: var(--text); margin-top: 2px; }

  .loading-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    padding: 1rem;
    text-align: center;
  }
  .error-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--up);
    padding: 0.75rem 0.9rem;
  }

  /* No data */
  .no-data {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    text-align: center;
    padding: 1.5rem;
    opacity: 0.7;
  }

  @media (max-width: 900px) {
    .main-layout { grid-template-columns: 1fr; padding: 0.8rem 1rem; }
    #tvContainer { height: 380px; }
  }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">Alpha<span>Scope</span> <span class="logo-badge">BETA</span></a>
  <a href="/" class="back-btn">← 返回主頁</a>
</header>

<div class="search-bar">
  <span class="search-label">股票代碼</span>
  <input type="text" class="search-input" id="stockInput" placeholder="例：2330、AAPL" maxlength="10"
    onkeydown="if(event.key==='Enter') loadChart()">
  <button class="search-btn" onclick="loadChart()">查詢 ↵</button>
  <div class="quick-chips" id="quickChips">
    <span class="chip" onclick="quickLoad('2330','台積電','TW')">2330 台積電</span>
    <span class="chip" onclick="quickLoad('2454','聯發科','TW')">2454 聯發科</span>
    <span class="chip" onclick="quickLoad('2317','鴻海','TW')">2317 鴻海</span>
    <span class="chip" onclick="quickLoad('2303','聯電','TW')">2303 聯電</span>
    <span class="chip" onclick="quickLoad('2412','中華電','TW')">2412 中華電</span>
    <span class="chip" onclick="quickLoad('AAPL','Apple','US')">AAPL 蘋果</span>
    <span class="chip" onclick="quickLoad('NVDA','NVIDIA','US')">NVDA 輝達</span>
    <span class="chip" onclick="quickLoad('TSLA','Tesla','US')">TSLA 特斯拉</span>
    <span class="chip" onclick="quickLoad('MSFT','微軟','US')">MSFT 微軟</span>
  </div>
</div>

<div class="main-layout">

  <!-- 左：TradingView K 線圖 -->
  <div class="chart-panel">
    <div class="chart-header">
      <div class="chart-title">
        <span id="chartStockName">— 請輸入股票代碼 —</span>
        <span class="stock-badge" id="chartStockId" style="display:none;"></span>
      </div>
      <div class="interval-btns">
        <button class="interval-btn active" onclick="setInterval('D')">日</button>
        <button class="interval-btn" onclick="setInterval('W')">週</button>
        <button class="interval-btn" onclick="setInterval('M')">月</button>
      </div>
    </div>
    <div id="tvContainer">
      <div class="no-data" style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0.5rem;">
        <div style="font-size:2rem;opacity:0.3;">📊</div>
        <div>請輸入股票代碼或點選快速選單</div>
      </div>
    </div>
  </div>

  <!-- 右：資訊面板 -->
  <div class="side-panel">

    <!-- 即時股價 -->
    <div class="info-card" id="priceCard">
      <div class="info-card-header">📈 即時行情</div>
      <div class="info-card-body" id="priceBody">
        <div class="no-data">查詢股票後顯示</div>
      </div>
    </div>

    <!-- 歷史走勢（Supabase，台股專用） -->
    <div class="info-card" id="histCard" style="display:none;">
      <div class="info-card-header">📅 近期走勢（Supabase）</div>
      <div id="histBars"></div>
      <div id="histDates"></div>
    </div>

    <!-- 估值資訊（Supabase） -->
    <div class="info-card" id="valCard" style="display:none;">
      <div class="info-card-header">🔢 估值資訊</div>
      <div class="info-card-body" id="valBody"></div>
    </div>

    <!-- 說明 -->
    <div class="info-card">
      <div class="info-card-header">ℹ️ 說明</div>
      <div class="info-card-body" style="font-size:0.6rem;color:var(--muted);line-height:1.7;font-family:'IBM Plex Mono',monospace;">
        <div>• 台股代碼直接輸入數字（如 2330）</div>
        <div>• 美股輸入英文代碼（如 AAPL）</div>
        <div>• K 線由 TradingView 提供</div>
        <div>• 歷史走勢、估值為台股專屬</div>
        <div style="margin-top:0.5rem;opacity:0.65;">⚠️ 資料僅供參考，不構成投資建議</div>
      </div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://fdxedcwtmlurumfjmlys.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_BAaZB86ibYZSvTFkFGkeQA_GspDNdf0';

  let currentStockId   = '';
  let currentStockName = '';
  let currentMarket    = 'TW';
  let currentInterval  = 'D';

  async function sbFetch(table, params) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
    });
    if (!r.ok) throw new Error(`Supabase ${r.status}`);
    return r.json();
  }

  function setInterval(iv) {
    currentInterval = iv;
    document.querySelectorAll('.interval-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if (currentStockId) renderTVChart();
  }

  function quickLoad(id, name, market) {
    document.getElementById('stockInput').value = id;
    currentStockId   = id;
    currentStockName = name;
    currentMarket    = market;
    loadChart();
  }

  function loadChart() {
    const raw = document.getElementById('stockInput').value.trim().toUpperCase();
    if (!raw) return;

    // 判斷市場
    const isTW = /^\d{4,5}$/.test(raw);
    currentMarket    = isTW ? 'TW' : 'US';
    currentStockId   = raw;
    currentStockName = raw;

    document.getElementById('chartStockName').textContent = raw;
    const badge = document.getElementById('chartStockId');
    badge.textContent = isTW ? 'TWSE' : 'NASDAQ/NYSE';
    badge.style.display = 'inline';

    renderTVChart();

    if (isTW) {
      loadSupabaseData(raw);
    } else {
      loadUSPrice(raw);
      document.getElementById('histCard').style.display = 'none';
      document.getElementById('valCard').style.display  = 'none';
    }
  }

  function renderTVChart() {
    const isTW = currentMarket === 'TW';
    // TradingView symbol format
    const sym = isTW
      ? `TWSE:${currentStockId}`
      : currentStockId;

    const ivMap = { D: 'D', W: 'W', M: 'M' };

    const container = document.getElementById('tvContainer');
    container.innerHTML = '';

    // Use TradingView Advanced Chart Widget (free, no API key)
    const wrapper = document.createElement('div');
    wrapper.className = 'tradingview-widget-container';
    wrapper.style.height = '100%';
    wrapper.style.width  = '100%';

    const div = document.createElement('div');
    div.id = 'tradingview_chart';
    div.style.height = '100%';
    wrapper.appendChild(div);

    const script = document.createElement('script');
    script.src = 'https://s3.tradingview.com/tv.js';
    script.async = true;
    script.onload = () => {
      if (typeof TradingView === 'undefined') {
        container.innerHTML = `<div class="no-data" style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0.5rem;">
          <div style="font-size:1.5rem;opacity:0.4;">⚠️</div>
          <div>TradingView 載入失敗，請重新整理</div>
        </div>`;
        return;
      }
      new TradingView.widget({
        autosize: true,
        symbol: sym,
        interval: ivMap[currentInterval],
        timezone: 'Asia/Taipei',
        theme: 'light',
        style: '1',
        locale: 'zh_TW',
        toolbar_bg: '#f8f8fc',
        enable_publishing: false,
        hide_side_toolbar: false,
        allow_symbol_change: true,
        container_id: 'tradingview_chart',
        studies: ['RSI@tv-basicstudies', 'MACD@tv-basicstudies'],
        show_popup_button: true,
      });
    };
    wrapper.appendChild(script);
    container.appendChild(wrapper);
  }

  async function loadSupabaseData(id) {
    // 股價歷史
    try {
      const rows = await sbFetch('stock_daily_twse',
        `stock_id=eq.${id}&order=date.desc&limit=60&select=date,close,chg_pct,volume`);

      if (rows && rows.length > 0) {
        // 更新名稱
        const nameRow = rows[0];
        document.getElementById('chartStockName').textContent = `${id}`;

        // 即時行情卡
        const latest = rows[0];
        const prev   = rows[1];
        const chgPct = (latest.chg_pct || 0) * 100;
        const chgAbs = prev ? (latest.close - prev.close).toFixed(2) : '—';
        const isUp   = chgPct >= 0;

        document.getElementById('priceBody').innerHTML = `
          <div class="price-big">${latest.close?.toLocaleString('zh-TW', {minimumFractionDigits:2}) ?? '—'}</div>
          <div class="price-chg ${isUp ? 'up' : 'down'}">
            ${isUp ? '▲' : '▼'} ${Math.abs(chgAbs)} (${isUp ? '+':''}${chgPct.toFixed(2)}%)
          </div>
          <div class="price-meta">
            <div class="meta-item"><div class="meta-label">日期</div><div class="meta-val">${latest.date}</div></div>
            <div class="meta-item"><div class="meta-label">成交量(千)</div><div class="meta-val">${latest.volume ? (latest.volume/1000).toFixed(0) : '—'}</div></div>
            <div class="meta-item"><div class="meta-label">資料來源</div><div class="meta-val">Supabase</div></div>
            <div class="meta-item"><div class="meta-label">筆數</div><div class="meta-val">${rows.length} 日</div></div>
          </div>`;

        // 走勢 bar
        const data    = rows.slice().reverse();
        const closes  = data.map(d => d.close);
        const minC    = Math.min(...closes);
        const maxC    = Math.max(...closes);
        const rangeC  = maxC - minC || minC * 0.01 || 1;
        const BAR_H   = 52;
        const BAR_W   = Math.max(3, Math.min(10, Math.floor(240 / data.length)));
        const GAP     = 2;

        document.getElementById('histBars').style.cssText = `display:flex;align-items:flex-end;gap:${GAP}px;height:${BAR_H}px;padding:0.5rem 0.9rem 0;`;
        document.getElementById('histBars').innerHTML = data.map((d, i) => {
          const hPx  = Math.max(3, ((d.close - minC) / rangeC * 0.8 + 0.15) * BAR_H).toFixed(1);
          const isP  = (d.chg_pct || 0) >= 0;
          const col  = isP ? '#dc2626' : '#16a34a';
          const isLast = i === data.length - 1;
          return `<div style="flex-shrink:0;width:${BAR_W}px;display:flex;flex-direction:column;justify-content:flex-end;height:${BAR_H}px;"
            title="${d.date}  ${d.close}  ${isP?'+':''}${((d.chg_pct||0)*100).toFixed(2)}%">
            <div style="height:${hPx}px;background:${col};border-radius:2px 2px 0 0;opacity:${isLast?1:0.65};${isLast?`outline:1.5px solid ${col};outline-offset:-1px;`:''}"></div>
          </div>`;
        }).join('');

        document.getElementById('histDates').innerHTML = `<div style="display:flex;gap:${GAP}px;">` +
          data.map((d, i) => `<div style="flex-shrink:0;width:${BAR_W}px;font-family:'IBM Plex Mono',monospace;font-size:0.38rem;color:var(--muted);text-align:center;overflow:hidden;">${i % 10 === 0 ? d.date.slice(5) : ''}</div>`).join('') + '</div>';

        document.getElementById('histCard').style.display = 'block';
      } else {
        document.getElementById('histCard').style.display = 'none';
        document.getElementById('priceBody').innerHTML = '<div class="no-data">無資料（此股票可能不在追蹤清單中）</div>';
      }
    } catch(e) {
      document.getElementById('priceBody').innerHTML = `<div class="error-msg">載入失敗：${e.message}</div>`;
    }

    // 估值
    try {
      const valRows = await sbFetch('stock_valuation_daily',
        `stock_id=eq.${id}&order=date.desc&limit=1&select=*`);
      if (valRows && valRows.length > 0) {
        const v = valRows[0];
        document.getElementById('valBody').innerHTML = `
          <div class="val-grid">
            <div class="val-item"><div class="val-label">本益比 PER</div><div class="val-num">${v.pe_ratio ?? '—'}</div></div>
            <div class="val-item"><div class="val-label">殖利率 %</div><div class="val-num">${v.dividend_yield ? (v.dividend_yield).toFixed(2)+'%' : '—'}</div></div>
            <div class="val-item"><div class="val-label">股價淨值 PBR</div><div class="val-num">${v.pb_ratio ?? '—'}</div></div>
          </div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:0.48rem;color:var(--muted);margin-top:0.5rem;">資料日期：${v.date ?? '—'}</div>`;
        document.getElementById('valCard').style.display = 'block';
      } else {
        document.getElementById('valCard').style.display = 'none';
      }
    } catch(e) {
      document.getElementById('valCard').style.display = 'none';
    }
  }

  async function loadUSPrice(sym) {
    document.getElementById('priceBody').innerHTML = '<div class="loading-msg">載入中…</div>';
    try {
      const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? '/api/news' : 'https://alphascope-fin.vercel.app/api/news';
      const r = await fetch(`${API}?endpoint=vix`); // 借用 vix 端點格式
      // 改用 Yahoo Finance（透過 Vercel proxy 不存在，改提示用戶）
      document.getElementById('priceBody').innerHTML = `
        <div style="font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--muted);line-height:1.7;">
          <div style="margin-bottom:0.5rem;">美股即時報價可至以下平台查看：</div>
          <a href="https://finance.yahoo.com/quote/${sym}" target="_blank" style="color:var(--accent2);display:block;margin-bottom:0.25rem;">→ Yahoo Finance</a>
          <a href="https://www.tradingview.com/chart/?symbol=${sym}" target="_blank" style="color:var(--accent2);display:block;margin-bottom:0.25rem;">→ TradingView</a>
          <a href="https://www.google.com/finance/quote/${sym}:NASDAQ" target="_blank" style="color:var(--accent2);display:block;">→ Google Finance</a>
        </div>`;
    } catch {
      document.getElementById('priceBody').innerHTML = '<div class="no-data">無法取得即時報價</div>';
    }
  }

  // 預設載入台積電
  window.addEventListener('load', () => {
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const name = params.get('name');
    if (id) {
      document.getElementById('stockInput').value = id;
      currentStockName = name || id;
      loadChart();
    }
  });
</script>
</body>
</html>
